name: "Publish Plugin"

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish"
        required: true
        default: "v1.0.0.0"

jobs:
  build:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"

  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        # v4
        with:
          name: build-artifact

      - name: Prepare GitHub Release assets
        run: |-
          for file in ./*; do
            md5sum "${file#./}" >> "${file%.*}.md5"
            sha256sum "${file#./}" >> "${file%.*}.sha256"
          done
          ls -l

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        # v4

      - name: Get Release Upload URL
        id: get-release
        run: |
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          URL="$(gh release view "$TAG" --json uploadUrl --jq '.uploadUrl')"
          echo "upload_url=$URL" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload GitHub Release assets
        uses: shogo82148/actions-upload-release-asset@8f6863c6c894ba46f9e676ef5cccec4752723c1e
        # v1.9.2
        with:
          upload_url: ${{ steps.get-release.outputs.upload_url }}
          asset_path: ./*

  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - upload
    steps:
      - name: Jellyfin plugin repo
        uses: Kevinjil/jellyfin-plugin-repo-action@296850372cd569cbcc040e834222a5afed861485
        # v0.4.3
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
